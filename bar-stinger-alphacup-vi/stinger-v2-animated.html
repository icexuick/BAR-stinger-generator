<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAR Alpha Cup VI — Stinger V2 (Animated Build)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #c9a84c;
    --gold-light: #e8d48a;
    --gold-bright: #fff1c4;
    --gold-dark: #8a6d2b;
    --panel-bg: #161614;

    /* Editable positions */
    --bar-top: 1%;
    --bar-width: 26%;
    --alpha-top: 16%;
    --alpha-width: 55%;
    --alpha-vi-top: 26%;
    --alpha-vi-width: 90%;
    --cup-bottom: 2%;
    --cup-width: 36%;
    --logo-scale: 1;
    --shield-scale: 1;
    --glow-size: 55%;
    --glow-opacity: 0.7;
    --spark-count: 50;
    --spark-size: 1;
    --spark-spread: 1;
    --spark-duration: 1;
    --spark-stretch: 1;
    --spark-decel: 0.3;
    --blade-texture-opacity: 1;
    --blade-scanline-gap: 3;
    --blade-scanline-weight: 1;
    --blade-highlight: 0.04;
    --flash-opacity: 0.5;
    --sweep-opacity: 1;
    --corner-opacity: 0.35;
  }

  body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000;
  }

  .stinger {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  /* ===== DIAGONAL WIPE BLADES ===== */
  .blade {
    position: absolute;
    top: -10%;
    height: 120%;
    z-index: 8;
    background: var(--panel-bg);
  }

  .blade-1 {
    left: -70%;
    width: 65%;
    transform: skewX(-12deg);
    /* animation applied via JS for dynamic timing */
  }
  .blade-2 {
    right: -70%;
    width: 65%;
    transform: skewX(-12deg);
    /* animation applied via JS for dynamic timing */
  }

  .blade-1::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 4px; height: 100%;
    background: linear-gradient(180deg, transparent 5%, var(--gold-dark) 20%, var(--gold-light) 45%, var(--gold) 55%, var(--gold-dark) 80%, transparent 95%);
    opacity: 0;
    /* animation applied via JS for dynamic timing */
  }
  .blade-2::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px; height: 100%;
    background: linear-gradient(180deg, transparent 5%, var(--gold-dark) 20%, var(--gold-light) 45%, var(--gold) 55%, var(--gold-dark) 80%, transparent 95%);
    opacity: 0;
    /* animation applied via JS for dynamic timing */
  }

  /* Blade texture: scanlines + highlight */
  .blade::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: var(--blade-texture-opacity);
    background:
      repeating-linear-gradient(0deg,
        transparent,
        transparent calc(var(--blade-scanline-gap) * 1px),
        rgba(255,255,255,0.02) calc(var(--blade-scanline-gap) * 1px),
        rgba(255,255,255,0.02) calc((var(--blade-scanline-gap) + var(--blade-scanline-weight)) * 1px)
      ),
      radial-gradient(ellipse at 50% 40%, rgba(255,255,255, var(--blade-highlight)), transparent 70%);
  }

  @keyframes bladeIn1  { 0% { left: -70%; }  100% { left: -8%; } }
  @keyframes bladeIn2  { 0% { right: -70%; } 100% { right: -8%; } }
  @keyframes bladeOut1 { 0% { left: -8%; }   100% { left: -70%; } }
  @keyframes bladeOut2 { 0% { right: -8%; }  100% { right: -70%; } }
  @keyframes edgeFade    { 0% { opacity: 0; } 100% { opacity: 0.9; } }
  @keyframes edgeFadeOut { 0% { opacity: 0.9; } 100% { opacity: 0; } }

  /* ===== LOGO ASSEMBLY ===== */
  .logo-assembly {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 20;
    width: calc(min(50vh, 38vw) * var(--logo-scale));
    aspect-ratio: 745 / 804;
  }

  .logo-part {
    position: absolute;
    opacity: 0;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .logo-part img, .logo-part svg { width: 100%; height: auto; display: block; }

  /* 1. SHIELD */
  .part-shield {
    inset: 0;
    transform: scale(var(--shield-scale));
    /* animation applied via JS for dynamic timing */
  }
  .part-shield svg { width: 100%; height: 100%; }

  /* 2. BAR LOGO */
  .part-bar {
    top: var(--bar-top);
    left: 50%;
    width: var(--bar-width);
    transform: translateX(-50%);
    /* animation applied via JS for dynamic timing */
  }

  /* 3. ALPHA TEXT */
  .part-alpha {
    top: var(--alpha-top);
    left: 50%;
    width: var(--alpha-width);
    transform: translateX(-50%);
    /* animation applied via JS for dynamic timing */
  }

  /* 4. αVI SYMBOL — the hero element */
  .part-alpha-vi {
    top: var(--alpha-vi-top);
    left: 50%;
    width: var(--alpha-vi-width);
    transform: translateX(-50%);
    /* animation applied via JS for dynamic timing */
  }
  .part-alpha-vi img, .part-alpha-vi object {
    filter: drop-shadow(0 0 30px rgba(201, 168, 76, 0.3));
  }

  /* 5. CUP TEXT */
  .part-cup {
    bottom: var(--cup-bottom);
    left: 50%;
    width: var(--cup-width);
    transform: translateX(-50%);
    /* animation applied via JS for dynamic timing */
  }

  /* ===== ELEMENT KEYFRAMES ===== */
  @keyframes shieldIn {
    0%   { opacity: 0; transform: scale(calc(var(--shield-scale) * 0.5)); }
    100% { opacity: 1; transform: scale(var(--shield-scale)); }
  }
  @keyframes barIn {
    0%   { opacity: 0; transform: translateX(-50%) translateY(-30px); }
    100% { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  @keyframes alphaIn {
    0%   { opacity: 0; transform: translateX(-50%) translateX(-40px); }
    100% { opacity: 1; transform: translateX(-50%) translateX(0); }
  }
  @keyframes alphaViIn {
    0%   { opacity: 0; transform: translateX(-50%) scale(0.6); }
    60%  { opacity: 1; transform: translateX(-50%) scale(1.06); }
    100% { opacity: 1; transform: translateX(-50%) scale(1); }
  }
  @keyframes cupIn {
    0%   { opacity: 0; transform: translateX(-50%) translateY(25px); }
    100% { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  @keyframes partOut {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ===== SHIELD GLOW ===== */
  .shield-glow {
    position: absolute;
    top: 50%; left: 50%;
    width: var(--glow-size);
    aspect-ratio: 1;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(240,230,200,0.45) 20%, rgba(201,168,76,0.15) 40%, rgba(30,25,10,0.08) 60%, transparent 72%);
    opacity: 0;
    z-index: 10;
    pointer-events: none;
    /* animation applied via JS for dynamic timing */
  }

  /* ===== GOLD FLASH ===== */
  .gold-flash {
    position: absolute;
    inset: 0;
    z-index: 18;
    background: radial-gradient(circle at 50% 50%, var(--gold-bright), var(--gold), transparent 70%);
    opacity: 0;
    /* animation applied via JS for dynamic timing */
    mix-blend-mode: screen;
    pointer-events: none;
  }
  @keyframes goldFlash {
    0%   { opacity: 0; transform: scale(0.5); }
    15%  { opacity: var(--flash-opacity); transform: scale(1.1); }
    100% { opacity: 0; transform: scale(2); }
  }

  /* ===== LIGHT SWEEP ===== */
  .sweep {
    position: absolute;
    top: 0; left: -50%;
    width: 35%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,248,225,0.08), rgba(255,255,255,0.12), rgba(255,248,225,0.08), transparent);
    z-index: 22;
    transform: skewX(-15deg);
    opacity: 0;
    /* animation applied via JS for dynamic timing */
    pointer-events: none;
  }
  @keyframes sweepAcross {
    0%   { left: -50%; opacity: 0; }
    10%  { opacity: var(--sweep-opacity); }
    90%  { opacity: var(--sweep-opacity); }
    100% { left: 130%; opacity: 0; }
  }

  /* ===== PARTICLES ===== */
  .particles {
    position: absolute;
    inset: 0;
    z-index: 15;
    pointer-events: none;
  }

  /* ===== CORNER ACCENTS ===== */
  .corner {
    position: absolute;
    z-index: 12;
    opacity: 0;
  }
  .corner-tl, .corner-br { /* animation applied via JS for dynamic timing */ }
  .corner-tr, .corner-bl { /* animation applied via JS for dynamic timing */ }
  .corner-tl { top: 8%; left: 8%; }
  .corner-tr { top: 8%; right: 8%; }
  .corner-bl { bottom: 8%; left: 8%; }
  .corner-br { bottom: 8%; right: 8%; }
  .corner svg { width: min(6vw, 6vh); height: auto; }

  @keyframes cornerShow { 0% { opacity: 0; } 100% { opacity: var(--corner-opacity); } }
  @keyframes cornerHide { 0% { opacity: var(--corner-opacity); } 100% { opacity: 0; } }

  /* ===== CONTROLS ===== */
  .controls {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    background: rgba(0,0,0,0.9);
    border: 1px solid rgba(201,168,76,0.35);
    border-radius: 8px;
    padding: 10px 24px;
    display: flex;
    gap: 16px;
    align-items: center;
    backdrop-filter: blur(10px);
  }
  .controls button {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    border: none; color: #1a1a18;
    padding: 8px 24px; border-radius: 4px;
    cursor: pointer; font-weight: 700; font-size: 14px;
  }
  .controls button:hover { filter: brightness(1.2); }
  .controls button.active { background: linear-gradient(135deg, #8a2b2b, #c94c4c); color: #fff; }
  .controls span { color: #777; font-size: 12px; }
  .controls .title { color: var(--gold); font-size: 13px; font-weight: 600; }

  /* ===== EDITOR PANEL ===== */
  .editor-panel {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 9999;
    background: rgba(0,0,0,0.92);
    border: 1px solid rgba(201,168,76,0.35);
    border-radius: 8px;
    padding: 16px;
    backdrop-filter: blur(10px);
    width: 280px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: none;
    max-height: 90vh;
    overflow-y: auto;
  }
  .editor-panel.open { display: block; }
  .editor-panel h3 {
    color: var(--gold);
    font-size: 13px;
    margin: 0 0 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .editor-panel .section-title {
    color: var(--gold-light);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 14px 0 6px;
    padding-top: 10px;
    border-top: 1px solid rgba(201,168,76,0.15);
  }
  .editor-panel .section-title:first-of-type { border-top: none; margin-top: 4px; padding-top: 0; }
  .editor-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .editor-row label {
    color: #aaa;
    font-size: 11px;
    width: 55px;
    flex-shrink: 0;
  }
  .editor-row input[type="range"] {
    flex: 1;
    accent-color: var(--gold);
    height: 4px;
  }
  .editor-row .value {
    color: var(--gold-light);
    font-size: 11px;
    width: 38px;
    text-align: right;
    font-family: monospace;
  }
  .editor-panel .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    padding-top: 10px;
    border-top: 1px solid rgba(201,168,76,0.15);
  }
  .editor-panel button {
    flex: 1;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    border: none; color: #1a1a18;
    padding: 6px 12px; border-radius: 4px;
    cursor: pointer; font-weight: 700; font-size: 11px;
  }
  .editor-panel button:hover { filter: brightness(1.2); }
  .editor-panel button.secondary {
    background: rgba(255,255,255,0.1);
    color: #aaa;
  }

  /* Dual-range slider */
  .dual-range {
    position: relative;
    height: 20px;
    flex: 1;
  }
  .dual-range input[type="range"] {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 20px;
    margin: 0;
    pointer-events: none;
    -webkit-appearance: none;
    appearance: none;
    background: transparent;
    accent-color: var(--gold);
  }
  .dual-range input[type="range"]::-webkit-slider-runnable-track {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
  }
  .dual-range input[type="range"]:last-child::-webkit-slider-runnable-track {
    background: transparent;
  }
  .dual-range input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--gold);
    cursor: pointer;
    pointer-events: all;
    margin-top: -5px;
    border: 2px solid var(--gold-dark);
  }
  .dual-range input[type="range"]::-moz-range-track {
    height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    border: none;
  }
  .dual-range input[type="range"]:last-child::-moz-range-track {
    background: transparent;
  }
  .dual-range input[type="range"]::-moz-range-thumb {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--gold);
    cursor: pointer;
    pointer-events: all;
    border: 2px solid var(--gold-dark);
  }
  .dual-range .track-fill {
    position: absolute;
    top: 8px;
    height: 4px;
    background: var(--gold-dark);
    border-radius: 2px;
    pointer-events: none;
  }
  .editor-row.timing-row {
    margin-bottom: 4px;
  }
  .editor-row.timing-row label {
    width: 65px;
  }
  .editor-panel pre {
    background: rgba(255,255,255,0.05);
    color: var(--gold-light);
    font-size: 10px;
    padding: 8px;
    border-radius: 4px;
    margin-top: 8px;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 120px;
    overflow-y: auto;
    display: none;
  }
  .editor-panel pre.show { display: block; }
</style>
</head>
<body>

<div class="stinger" id="stinger">
  <div class="blade blade-1"></div>
  <div class="blade blade-2"></div>
  <div class="gold-flash"></div>

  <div class="shield-glow"></div>

  <div class="logo-assembly">
    <!-- 1. Shield -->
    <div class="logo-part part-shield">
      <object data="assets/shield.svg" type="image/svg+xml" style="width:100%;height:100%;pointer-events:none;"></object>
    </div>

    <!-- 2. BAR logo -->
    <div class="logo-part part-bar">
      <object data="assets/bar-logo.svg" type="image/svg+xml" style="width:100%;height:auto;pointer-events:none;"></object>
    </div>

    <!-- 3. ALPHA text -->
    <div class="logo-part part-alpha">
      <object data="assets/alpha.svg" type="image/svg+xml" style="width:100%;height:auto;pointer-events:none;"></object>
    </div>

    <!-- 4. αVI symbol (the hero) -->
    <div class="logo-part part-alpha-vi">
      <object data="assets/alpha-vi.svg" type="image/svg+xml" style="width:100%;height:auto;pointer-events:none;"></object>
    </div>

    <!-- 5. CUP text -->
    <div class="logo-part part-cup">
      <object data="assets/cup.svg" type="image/svg+xml" style="width:100%;height:auto;pointer-events:none;"></object>
    </div>
  </div>

  <div class="particles" id="particles"></div>
  <div class="sweep"></div>

  <div class="corner corner-tl"><svg viewBox="0 0 60 60"><path d="M0 0 L60 0 L60 4 L4 4 L4 60 L0 60 Z" fill="rgba(201,168,76,0.6)"/></svg></div>
  <div class="corner corner-tr"><svg viewBox="0 0 60 60"><path d="M60 0 L0 0 L0 4 L56 4 L56 60 L60 60 Z" fill="rgba(201,168,76,0.6)"/></svg></div>
  <div class="corner corner-bl"><svg viewBox="0 0 60 60"><path d="M0 60 L60 60 L60 56 L4 56 L4 0 L0 0 Z" fill="rgba(201,168,76,0.6)"/></svg></div>
  <div class="corner corner-br"><svg viewBox="0 0 60 60"><path d="M60 60 L0 60 L0 56 L56 56 L56 0 L60 0 Z" fill="rgba(201,168,76,0.6)"/></svg></div>
</div>

<div class="controls">
  <span class="title">V2 — Animated Build</span>
  <button onclick="replay()">&#9654; Replay</button>
  <button id="btnPause" onclick="togglePause()">&#9646;&#9646; Pause</button>
  <button id="btnLoop" onclick="toggleLoop()">&#128260; Loop</button>
  <span id="loopStatus">Off</span>
  <button onclick="toggleEditor()">&#9881; Editor</button>
  <input type="range" id="timeline" min="0" max="2600" step="1" value="0" style="width:120px;accent-color:var(--gold);" oninput="scrub(this.value)" title="Timeline scrubber">
  <span id="timeDisplay" style="font-family:monospace;">0.00s</span>
</div>

<div class="editor-panel" id="editorPanel">
  <h3>Position Editor</h3>

  <div class="section-title">BAR Logo</div>
  <div class="editor-row">
    <label>Top</label>
    <input type="range" min="-10" max="30" step="0.5" value="1" data-var="--bar-top" data-unit="%">
    <span class="value">1%</span>
  </div>
  <div class="editor-row">
    <label>Width</label>
    <input type="range" min="10" max="60" step="1" value="26" data-var="--bar-width" data-unit="%">
    <span class="value">26%</span>
  </div>

  <div class="section-title">ALPHA Text</div>
  <div class="editor-row">
    <label>Top</label>
    <input type="range" min="0" max="40" step="0.5" value="16" data-var="--alpha-top" data-unit="%">
    <span class="value">16%</span>
  </div>
  <div class="editor-row">
    <label>Width</label>
    <input type="range" min="20" max="80" step="1" value="55" data-var="--alpha-width" data-unit="%">
    <span class="value">55%</span>
  </div>

  <div class="section-title">Alpha VI (Hero)</div>
  <div class="editor-row">
    <label>Top</label>
    <input type="range" min="5" max="50" step="0.5" value="26" data-var="--alpha-vi-top" data-unit="%">
    <span class="value">26%</span>
  </div>
  <div class="editor-row">
    <label>Width</label>
    <input type="range" min="40" max="120" step="1" value="90" data-var="--alpha-vi-width" data-unit="%">
    <span class="value">90%</span>
  </div>

  <div class="section-title">CUP Text</div>
  <div class="editor-row">
    <label>Bottom</label>
    <input type="range" min="-5" max="25" step="0.5" value="2" data-var="--cup-bottom" data-unit="%">
    <span class="value">2%</span>
  </div>
  <div class="editor-row">
    <label>Width</label>
    <input type="range" min="15" max="60" step="1" value="36" data-var="--cup-width" data-unit="%">
    <span class="value">36%</span>
  </div>

  <div class="section-title">Logo</div>
  <div class="editor-row">
    <label>Scale</label>
    <input type="range" min="0.5" max="2" step="0.01" value="1" data-var="--logo-scale" data-unit="">
    <span class="value">1</span>
  </div>

  <div class="section-title">Shield</div>
  <div class="editor-row">
    <label>Scale</label>
    <input type="range" min="0.5" max="1.5" step="0.01" value="1" data-var="--shield-scale" data-unit="">
    <span class="value">1</span>
  </div>

  <div class="section-title">Shield Glow</div>
  <div class="editor-row">
    <label>Size</label>
    <input type="range" min="20" max="120" step="1" value="55" data-var="--glow-size" data-unit="%">
    <span class="value">55%</span>
  </div>
  <div class="editor-row">
    <label>Opacity</label>
    <input type="range" min="0" max="1" step="0.05" value="0.7" data-var="--glow-opacity" data-unit="">
    <span class="value">0.7</span>
  </div>

  <div class="section-title">Timing</div>
  <div class="editor-row">
    <label>Duration</label>
    <input type="range" min="1" max="8" step="0.1" value="3" data-key="totalDuration">
    <span class="value">3.0s</span>
  </div>
  <div class="editor-row timing-row">
    <label>Blades</label>
    <div class="dual-range" data-group="blades">
      <div class="track-fill"></div>
      <input type="range" min="0" max="2.8" step="0.05" value="0" data-key="bladesStart">
      <input type="range" min="0" max="2.8" step="0.05" value="2.55" data-key="bladesEnd">
    </div>
  </div>
  <div class="editor-row timing-row">
    <label>Shield</label>
    <div class="dual-range" data-group="shield">
      <div class="track-fill"></div>
      <input type="range" min="0" max="2.8" step="0.05" value="0.3" data-key="shieldStart">
      <input type="range" min="0" max="2.8" step="0.05" value="2.35" data-key="shieldEnd">
    </div>
  </div>
  <div class="editor-row timing-row">
    <label>BAR</label>
    <div class="dual-range" data-group="bar">
      <div class="track-fill"></div>
      <input type="range" min="0" max="2.8" step="0.05" value="0.55" data-key="barStart">
      <input type="range" min="0" max="2.8" step="0.05" value="2.35" data-key="barEnd">
    </div>
  </div>
  <div class="editor-row timing-row">
    <label>ALPHA</label>
    <div class="dual-range" data-group="alpha">
      <div class="track-fill"></div>
      <input type="range" min="0" max="2.8" step="0.05" value="0.72" data-key="alphaStart">
      <input type="range" min="0" max="2.8" step="0.05" value="2.35" data-key="alphaEnd">
    </div>
  </div>
  <div class="editor-row timing-row">
    <label>Alpha VI</label>
    <div class="dual-range" data-group="alphaVi">
      <div class="track-fill"></div>

<script>
let TOTAL_DURATION = 3000;
const STORAGE_KEY = 'stinger-v2-editor';
let looping = false;
let loopTimer = null;
let animStyleEl = null;

/* ===== TIMING HELPERS ===== */
function getT(key) {
  const el = document.querySelector(`[data-key="${key}"]`);
  return el ? parseFloat(el.value) : 0;
}

function getTotalDuration() { return getT('totalDuration'); }

function updateDuration() {
  const dur = getTotalDuration();
  TOTAL_DURATION = dur * 1000;
  const maxT = Math.max(0.5, dur - 0.2);
  // Update all timing slider max values
  document.querySelectorAll('.dual-range input[type="range"]').forEach(input => {
    input.max = maxT.toFixed(2);
    if (parseFloat(input.value) > maxT) input.value = maxT.toFixed(2);
  });
  // Update timeline scrubber
  const timeline = document.getElementById('timeline');
  if (timeline) timeline.max = Math.round(dur * 1000);
  // Update loop interval
  if (looping) {
    clearInterval(loopTimer);
    loopTimer = setInterval(replay, TOTAL_DURATION);
  }
  // Update duration display
  const durInput = document.querySelector('[data-key="totalDuration"]');
  if (durInput && durInput.nextElementSibling) {
    durInput.nextElementSibling.textContent = dur.toFixed(1) + 's';
  }
  // Refresh dual-range fills (max changed)
  document.querySelectorAll('.dual-range').forEach(container => {
    const inputs = container.querySelectorAll('input[type="range"]');
    const fill = container.querySelector('.track-fill');
    const s = parseFloat(inputs[0].value);
    const e = parseFloat(inputs[1].value);
    const min = parseFloat(inputs[0].min);
    const max = parseFloat(inputs[0].max);
    fill.style.left = ((s - min) / (max - min)) * 100 + '%';
    fill.style.width = (((e - min) / (max - min)) - ((s - min) / (max - min))) * 100 + '%';
  });
}

// Wire up duration slider
document.querySelector('[data-key="totalDuration"]').addEventListener('input', function() {
  updateDuration();
  applyAllAnimations();
  saveToStorage();
});

/* ===== APPLY ALL DYNAMIC ANIMATIONS ===== */
function applyAllAnimations() {
  // Read all timing values
  const t = {
    bladesStart: getT('bladesStart'), bladesEnd: getT('bladesEnd'),
    shieldStart: getT('shieldStart'), shieldEnd: getT('shieldEnd'),
    barStart: getT('barStart'), barEnd: getT('barEnd'),
    alphaStart: getT('alphaStart'), alphaEnd: getT('alphaEnd'),
    alphaViStart: getT('alphaViStart'), alphaViEnd: getT('alphaViEnd'),
    cupStart: getT('cupStart'), cupEnd: getT('cupEnd'),
    glowStart: getT('glowStart'), glowEnd: getT('glowEnd'),
    flashStart: getT('flashStart'), flashEnd: getT('flashEnd'),
    sweepStart: getT('sweepStart'), sweepEnd: getT('sweepEnd'),
    cornersStart: getT('cornersStart'), cornersEnd: getT('cornersEnd'),
    sparksStart: getT('sparksStart'), sparksEnd: getT('sparksEnd'),
  };

  // Blade animation durations
  const bladeInDur = 0.4;
  const bladeOutDur = 0.35;
  const bladeOutDelay = Math.max(t.bladesStart + bladeInDur, t.bladesEnd - bladeOutDur);

  // Edge glow follows blades
  const edgeDelay = t.bladesStart + bladeInDur - 0.05;

  // Logo part out durations
  const partOutDur = 0.25;

  // Shield
  const shieldInDur = 0.35;
  const shieldOutDelay = Math.max(t.shieldStart + shieldInDur, t.shieldEnd - partOutDur);

  // BAR
  const barInDur = 0.3;
  const barOutDelay = Math.max(t.barStart + barInDur, t.barEnd - partOutDur);

  // ALPHA
  const alphaInDur = 0.3;
  const alphaOutDelay = Math.max(t.alphaStart + alphaInDur, t.alphaEnd - partOutDur);

  // Alpha VI
  const alphaViInDur = 0.35;
  const alphaViOutDelay = Math.max(t.alphaViStart + alphaViInDur, t.alphaViEnd - partOutDur);

  // CUP
  const cupInDur = 0.3;
  const cupOutDelay = Math.max(t.cupStart + cupInDur, t.cupEnd - partOutDur);

  // Glow
  const glowFadeIn = 0.5;
  const glowFadeOut = 0.5;
  const glowPulseDelay = t.glowStart + glowFadeIn * 0.5;
  const glowPulseDur = Math.max(0.3, t.glowEnd - t.glowStart - glowFadeOut * 0.5);

  // Flash
  const flashDur = Math.max(0.2, t.flashEnd - t.flashStart);

  // Sweep
  const sweepDur = Math.max(0.2, t.sweepEnd - t.sweepStart);

  // Corners
  const cornerShowDur = 0.3;
  const cornerHideDur = 0.2;
  const cornerHideDelay = Math.max(t.cornersStart + cornerShowDur, t.cornersEnd - cornerHideDur);

  if (animStyleEl) animStyleEl.remove();
  animStyleEl = document.createElement('style');
  animStyleEl.textContent = `
    /* Blades */
    .blade-1 {
      animation: bladeIn1 ${bladeInDur}s cubic-bezier(0.7, 0, 0.3, 1) ${t.bladesStart}s forwards,
                 bladeOut1 ${bladeOutDur}s cubic-bezier(0.7, 0, 0.3, 1) ${bladeOutDelay}s forwards;
    }
    .blade-2 {
      animation: bladeIn2 ${bladeInDur}s cubic-bezier(0.7, 0, 0.3, 1) ${t.bladesStart + 0.05}s forwards,
                 bladeOut2 ${bladeOutDur}s cubic-bezier(0.7, 0, 0.3, 1) ${bladeOutDelay + 0.05}s forwards;
    }
    .blade-1::after {
      animation: edgeFade 0.3s ease ${edgeDelay}s forwards, edgeFadeOut 0.2s ease ${bladeOutDelay}s forwards;
    }
    .blade-2::after {
      animation: edgeFade 0.3s ease ${edgeDelay}s forwards, edgeFadeOut 0.2s ease ${bladeOutDelay}s forwards;
    }

    /* Logo parts */
    .part-shield {
      animation: shieldIn ${shieldInDur}s cubic-bezier(0.16, 1, 0.3, 1) ${t.shieldStart}s forwards,
                 partOut ${partOutDur}s ease-in ${shieldOutDelay}s forwards;
    }
    .part-bar {
      animation: barIn ${barInDur}s cubic-bezier(0.16, 1, 0.3, 1) ${t.barStart}s forwards,
                 partOut ${partOutDur}s ease-in ${barOutDelay}s forwards;
    }
    .part-alpha {
      animation: alphaIn ${alphaInDur}s cubic-bezier(0.16, 1, 0.3, 1) ${t.alphaStart}s forwards,
                 partOut ${partOutDur}s ease-in ${alphaOutDelay}s forwards;
    }
    .part-alpha-vi {
      animation: alphaViIn ${alphaViInDur}s cubic-bezier(0.16, 1, 0.3, 1) ${t.alphaViStart}s forwards,
                 partOut ${partOutDur}s ease-in ${alphaViOutDelay}s forwards;
    }
    .part-cup {
      animation: cupIn ${cupInDur}s cubic-bezier(0.16, 1, 0.3, 1) ${t.cupStart}s forwards,
                 partOut ${partOutDur}s ease-in ${cupOutDelay}s forwards;
    }

    /* Shield Glow */
    @keyframes glowIn {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
      100% { opacity: var(--glow-opacity); transform: translate(-50%, -50%) scale(1); }
    }
    @keyframes glowPulse {
      0%   { opacity: var(--glow-opacity); transform: translate(-50%, -50%) scale(1); }
      40%  { opacity: calc(var(--glow-opacity) * 1.3); transform: translate(-50%, -50%) scale(1.15); }
      100% { opacity: var(--glow-opacity); transform: translate(-50%, -50%) scale(1); }
    }
    @keyframes glowOut {
      0%   { opacity: var(--glow-opacity); }
      100% { opacity: 0; }
    }
    .shield-glow {
      animation: glowIn ${glowFadeIn}s cubic-bezier(0.16, 1, 0.3, 1) ${t.glowStart}s forwards,
                 glowPulse ${glowPulseDur}s ease-in-out ${glowPulseDelay}s 1 forwards,
                 glowOut ${glowFadeOut}s ease-in ${t.glowEnd}s forwards;
    }

    /* Gold Flash */
    .gold-flash {
      animation: goldFlash ${flashDur}s ease-out ${t.flashStart}s forwards;
    }

    /* Sweep */
    .sweep {
      animation: sweepAcross ${sweepDur}s ease-in-out ${t.sweepStart}s forwards;
    }

    /* Corners */
    .corner-tl, .corner-br {
      animation: cornerShow ${cornerShowDur}s ease ${t.cornersStart}s forwards,
                 cornerHide ${cornerHideDur}s ease ${cornerHideDelay}s forwards;
    }
    .corner-tr, .corner-bl {
      animation: cornerShow ${cornerShowDur}s ease ${t.cornersStart + 0.05}s forwards,
                 cornerHide ${cornerHideDur}s ease ${cornerHideDelay}s forwards;
    }
  `;
  document.head.appendChild(animStyleEl);
}

/* ===== DUAL-RANGE SLIDER LOGIC ===== */
function initDualRanges() {
  document.querySelectorAll('.dual-range').forEach(container => {
    const inputs = container.querySelectorAll('input[type="range"]');
    const fill = container.querySelector('.track-fill');
    const startInput = inputs[0];
    const endInput = inputs[1];

    function updateFill() {
      const min = parseFloat(startInput.min);
      const max = parseFloat(startInput.max);
      const s = parseFloat(startInput.value);
      const e = parseFloat(endInput.value);
      const leftPct = ((s - min) / (max - min)) * 100;
      const rightPct = ((e - min) / (max - min)) * 100;
      fill.style.left = leftPct + '%';
      fill.style.width = (rightPct - leftPct) + '%';
    }

    startInput.addEventListener('input', () => {
      if (parseFloat(startInput.value) > parseFloat(endInput.value)) {
        startInput.value = endInput.value;
      }
      updateFill();
      applyAllAnimations();
      saveToStorage();
    });

    endInput.addEventListener('input', () => {
      if (parseFloat(endInput.value) < parseFloat(startInput.value)) {
        endInput.value = startInput.value;
      }
      updateFill();
      applyAllAnimations();
      saveToStorage();
    });

    updateFill();
  });
}

/* ===== PARTICLES ===== */
function getParticleSettings() {
  const cs = getComputedStyle(document.documentElement);
  return {
    count: parseInt(cs.getPropertyValue('--spark-count')) || 50,
    sizeMul: parseFloat(cs.getPropertyValue('--spark-size')) || 1,
    spreadMul: parseFloat(cs.getPropertyValue('--spark-spread')) || 1,
    durMul: parseFloat(cs.getPropertyValue('--spark-duration')) || 1,
    stretch: parseFloat(cs.getPropertyValue('--spark-stretch')) || 1,
    decel: parseFloat(cs.getPropertyValue('--spark-decel')) || 0.3,
  };
}

function generateParticles(container) {
  container.innerHTML = '';
  const cfg = getParticleSettings();
  // Scale sparks relative to viewport so they look the same at any resolution
  const vScale = window.innerHeight / 900;
  for (let i = 0; i < cfg.count; i++) {
    const p = document.createElement('div');
    const angle = (Math.PI * 2 / cfg.count) * i + (Math.random() - 0.5) * 0.6;
    const dist = (80 + Math.random() * 350) * cfg.spreadMul * vScale;
    const dx = Math.cos(angle) * dist, dy = Math.sin(angle) * dist;
    const dur = (0.4 + Math.random() * 0.5) * cfg.durMul;
    const sparkStart = getT('sparksStart');
    const delay = sparkStart + Math.random() * 0.15;
    const size = (2 + Math.random() * 5) * cfg.sizeMul * vScale;
    const angleDeg = angle * (180 / Math.PI);

    // Stretch: width is elongated along movement direction, height stays as base size
    const w = size * cfg.stretch;
    const h = size;
    const br = cfg.stretch > 1.3 ? `${h/2}px` : '50%';

    // Decel: how much the particle slows down (0 = constant speed, 1 = almost stops)
    // We add intermediate keyframe steps where the particle has already traveled most of the distance
    const d = Math.max(0, Math.min(1, cfg.decel));
    const mid1Pct = 0.15;
    const mid2Pct = 0.5;
    // At mid2, particle has traveled further with decel (front-loaded movement)
    const mid2Travel = 1 - Math.pow(1 - mid2Pct, 1 + d * 4);
    const endTravel = 1;

    p.style.cssText = `position:absolute;top:50%;left:50%;width:${w}px;height:${h}px;background:rgba(232,212,138,${0.5+Math.random()*0.5});border-radius:${br};opacity:0;box-shadow:0 0 ${size*2}px rgba(201,168,76,0.6),0 0 ${size*4}px rgba(201,168,76,0.2);transform-origin:center center;`;
    const kf = `p${Date.now()}_${i}`;
    const s = document.createElement('style');
    // Rotate the stretched particle to align with its movement direction
    const rot = cfg.stretch > 1.3 ? `rotate(${angleDeg}deg)` : '';
    s.textContent = `@keyframes ${kf}{` +
      `0%{opacity:0;transform:translate(0,0) scale(0) ${rot}}` +
      `15%{opacity:1;transform:translate(${dx*mid1Pct}px,${dy*mid1Pct}px) scale(1.2) ${rot}}` +
      `50%{opacity:0.7;transform:translate(${dx*mid2Travel}px,${dy*mid2Travel}px) scale(1) ${rot}}` +
      `100%{opacity:0;transform:translate(${dx*endTravel}px,${dy*endTravel}px) scale(0) ${rot}}}`;
    document.head.appendChild(s);
    p.style.animation = `${kf} ${dur}s ease-out ${delay}s forwards`;
    container.appendChild(p);
  }
}

/* ===== REPLAY / LOOP ===== */
function replay() {
  applyAllAnimations();
  const s = document.getElementById('stinger'), c = s.cloneNode(true);
  s.parentNode.replaceChild(c, s);
  requestAnimationFrame(() => generateParticles(c.querySelector('.particles')));
}

function toggleLoop() {
  looping = !looping;
  const btn = document.getElementById('btnLoop');
  const status = document.getElementById('loopStatus');
  if (looping) {
    btn.classList.add('active');
    status.textContent = 'On';
    replay();
    loopTimer = setInterval(replay, TOTAL_DURATION);
  } else {
    btn.classList.remove('active');
    status.textContent = 'Off';
    clearInterval(loopTimer);
    loopTimer = null;
  }
}

/* ===== PAUSE / SCRUB ===== */
let paused = false;

function getAllAnimations() {
  const anims = [];
  document.getAnimations().forEach(a => anims.push(a));
  document.querySelectorAll('#stinger, #stinger *').forEach(el => {
    el.getAnimations().forEach(a => {
      if (!anims.includes(a)) anims.push(a);
    });
  });
  return anims;
}

function togglePause() {
  paused = !paused;
  const btn = document.getElementById('btnPause');
  const anims = getAllAnimations();
  if (paused) {
    if (looping) toggleLoop();
    anims.forEach(a => a.pause());
    btn.classList.add('active');
    btn.innerHTML = '&#9654; Play';
  } else {
    anims.forEach(a => a.play());
    btn.classList.remove('active');
    btn.innerHTML = '&#9646;&#9646; Pause';
  }
}

function scrub(ms) {
  const t = parseFloat(ms);
  document.getElementById('timeDisplay').textContent = (t / 1000).toFixed(2) + 's';
  const anims = getAllAnimations();
  anims.forEach(a => {
    a.pause();
    a.currentTime = t;
  });
  if (!paused) {
    paused = true;
    const btn = document.getElementById('btnPause');
    btn.classList.add('active');
    btn.innerHTML = '&#9654; Play';
  }
}

/* ===== EDITOR ===== */
function toggleEditor() {
  document.getElementById('editorPanel').classList.toggle('open');
}

/* ===== LOCAL STORAGE ===== */
function saveToStorage() {
  const data = {};
  document.querySelectorAll('.editor-panel input[type="range"]').forEach(input => {
    const key = input.dataset.var || input.dataset.key;
    if (key) data[key] = input.value;
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadFromStorage() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return;
  try {
    const data = JSON.parse(raw);
    document.querySelectorAll('.editor-panel input[type="range"]').forEach(input => {
      const key = input.dataset.var || input.dataset.key;
      if (key && data[key] !== undefined) {
        input.value = data[key];
        const unit = input.dataset.unit;
        if (input.dataset.var) {
          const val = data[key] + (unit || '');
          document.documentElement.style.setProperty(input.dataset.var, val);
          input.nextElementSibling.textContent = val || data[key];
        }
      }
    });
    // update dual-range fills
    document.querySelectorAll('.dual-range').forEach(container => {
      const inputs = container.querySelectorAll('input[type="range"]');
      const fill = container.querySelector('.track-fill');
      const s = parseFloat(inputs[0].value);
      const e = parseFloat(inputs[1].value);
      const min = parseFloat(inputs[0].min);
      const max = parseFloat(inputs[0].max);
      fill.style.left = ((s - min) / (max - min)) * 100 + '%';
      fill.style.width = (((e - min) / (max - min)) * 100 - ((s - min) / (max - min)) * 100) + '%';
    });
  } catch(e) {}
}

/* ===== CSS VAR SLIDERS ===== */
const defaults = {};
document.querySelectorAll('.editor-panel input[type="range"]').forEach(input => {
  const key = input.dataset.var || input.dataset.key;
  if (key) defaults[key] = input.value;

  if (input.dataset.var) {
    input.addEventListener('input', () => {
      const val = input.value + (input.dataset.unit || '');
      document.documentElement.style.setProperty(input.dataset.var, val);
      input.nextElementSibling.textContent = val || input.value;
      saveToStorage();
    });
  }
});

function resetPositions() {
  localStorage.removeItem(STORAGE_KEY);
  document.querySelectorAll('.editor-panel input[type="range"]').forEach(input => {
    const key = input.dataset.var || input.dataset.key;
    if (key && defaults[key] !== undefined) {
      input.value = defaults[key];
      if (input.dataset.var) {
        const val = defaults[key] + (input.dataset.unit || '');
        document.documentElement.style.setProperty(input.dataset.var, val);
        input.nextElementSibling.textContent = val || defaults[key];
      }
    }
  });
  updateDuration();
  // Update dual-range fills
  document.querySelectorAll('.dual-range').forEach(container => {
    const inputs = container.querySelectorAll('input[type="range"]');
    const fill = container.querySelector('.track-fill');
    const s = parseFloat(inputs[0].value);
    const e = parseFloat(inputs[1].value);
    const min = parseFloat(inputs[0].min);
    const max = parseFloat(inputs[0].max);
    fill.style.left = ((s - min) / (max - min)) * 100 + '%';
    fill.style.width = (((e - min) / (max - min)) * 100 - ((s - min) / (max - min)) * 100) + '%';
  });
  applyAllAnimations();
}

function copyCSS() {
  const lines = [];
  document.querySelectorAll('.editor-panel input[type="range"]').forEach(input => {
    const key = input.dataset.var || input.dataset.key;
    const unit = input.dataset.unit || '';
    if (input.dataset.var) {
      lines.push(`  ${input.dataset.var}: ${input.value}${unit};`);
    } else if (input.dataset.key) {
      lines.push(`  /* ${input.dataset.key}: ${input.value}${unit ? unit : 's'} */`);
    }
  });
  const css = `:root {\n${lines.join('\n')}\n}`;
  navigator.clipboard.writeText(css).then(() => {
    const out = document.getElementById('cssOutput');
    out.textContent = css;
    out.classList.add('show');
    setTimeout(() => out.classList.remove('show'), 4000);
  });
}

/* ===== DESIGN FILE (JSON) ===== */
function getDesignData() {
  const data = {};
  document.querySelectorAll('.editor-panel input[type="range"]').forEach(input => {
    const key = input.dataset.var || input.dataset.key;
    if (key) data[key] = input.value;
  });
  return data;
}

function applyDesignData(data) {
  document.querySelectorAll('.editor-panel input[type="range"]').forEach(input => {
    const key = input.dataset.var || input.dataset.key;
    if (key && data[key] !== undefined) {
      input.value = data[key];
      if (input.dataset.var) {
        const val = data[key] + (input.dataset.unit || '');
        document.documentElement.style.setProperty(input.dataset.var, val);
        input.nextElementSibling.textContent = val || data[key];
      }
    }
  });
  updateDuration();
  // Update dual-range fills
  document.querySelectorAll('.dual-range').forEach(container => {
    const inputs = container.querySelectorAll('input[type="range"]');
    const fill = container.querySelector('.track-fill');
    const s = parseFloat(inputs[0].value);
    const e = parseFloat(inputs[1].value);
    const min = parseFloat(inputs[0].min);
    const max = parseFloat(inputs[0].max);
    fill.style.left = ((s - min) / (max - min)) * 100 + '%';
    fill.style.width = (((e - min) / (max - min)) * 100 - ((s - min) / (max - min)) * 100) + '%';
  });
  applyAllAnimations();
}

function saveDesignFile() {
  const data = getDesignData();
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'design.json';
  a.click();
  URL.revokeObjectURL(a.href);

  const out = document.getElementById('cssOutput');
  out.textContent = 'Design saved to design.json';
  out.classList.add('show');
  setTimeout(() => out.classList.remove('show'), 3000);
}

function loadDesignFile() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        applyDesignData(data);
        saveToStorage();
        const out = document.getElementById('cssOutput');
        out.textContent = 'Design loaded from ' + file.name;
        out.classList.add('show');
        setTimeout(() => out.classList.remove('show'), 3000);
      } catch(err) {
        alert('Invalid design file: ' + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// Auto-load latest design*.json if served via HTTP (for preview/export)
async function tryLoadLatestDesign() {
  // Try common design file names, pick the one with newest Last-Modified
  const candidates = ['design.json'];
  // Also try numbered variants
  for (let i = 2; i <= 10; i++) candidates.push(`design-v${i}.json`, `design${i}.json`);
  // Also try the download duplicate pattern from browsers
  candidates.push('design (1).json', 'design (2).json', 'design (3).json');

  const results = await Promise.allSettled(
    candidates.map(async name => {
      const r = await fetch(name);
      if (!r.ok) throw new Error();
      const modified = r.headers.get('Last-Modified');
      const mtime = modified ? new Date(modified).getTime() : 0;
      const data = await r.json();
      return { name, data, mtime };
    })
  );

  const found = results
    .filter(r => r.status === 'fulfilled')
    .map(r => r.value)
    .sort((a, b) => b.mtime - a.mtime);

  if (found.length > 0) {
    applyDesignData(found[0].data);
    console.log(`Loaded design: ${found[0].name}` + (found.length > 1 ? ` (newest of ${found.length})` : ''));
    return true;
  }
  return false;
}

/* ===== INIT ===== */
(async () => {
  // In browser: prefer localStorage (always up to date from editor)
  // design.json auto-load is fallback / used by export script
  const hasStorage = localStorage.getItem(STORAGE_KEY);
  if (hasStorage) {
    loadFromStorage();
  } else {
    await tryLoadLatestDesign();
  }
  updateDuration();
  initDualRanges();
  applyAllAnimations();
  generateParticles(document.getElementById('particles'));
})();
